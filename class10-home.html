<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 10 CBSE - ENGLISHJIBI</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            color: #ffffff;
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                              linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .category-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.98));
        }

        @media (hover: hover) and (pointer: fine) {
            .category-card:hover {
                transform: translateY(-6px);
                border-color: rgba(255, 255, 255, 0.15);
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            }
            .category-card:hover .card-icon {
                transform: scale(1.05);
            }
            .category-card:hover .arrow-icon {
                transform: translateX(4px);
                opacity: 1;
            }
        }

        .card-icon {
            transition: all 0.3s ease;
        }

        .arrow-icon {
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        @media (hover: none) {
            .arrow-icon {
                opacity: 0.7;
            }
        }

        .back-btn {
            transition: all 0.3s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .back-btn:hover {
                background: rgba(59, 130, 246, 0.1);
                border-color: #3b82f6;
                color: #3b82f6;
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Back Navigation -->
    <nav class="w-full max-w-5xl mx-auto px-4 sm:px-6 pt-4 sm:pt-6">
        <a href="index.html" class="back-btn inline-flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl border border-gray-700 text-gray-400 text-sm font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Home
        </a>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center px-4 py-6 sm:py-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 mb-4">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
                    <span class="text-sm font-black text-white">10</span>
                </div>
                <span class="text-xs sm:text-sm font-bold text-blue-400 uppercase">Class 10 CBSE</span>
            </div>
            <h1 class="text-2xl sm:text-3xl font-black tracking-tight mb-2 text-white">
                Board Exam <span class="text-blue-500">Questions</span>
            </h1>
            <p class="text-gray-400 text-sm">
                Previous year questions • 2020-2025 • 241 Total
            </p>
        </div>

        <!-- Category Cards (Dynamically Generated) -->
        <div id="category-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-3xl">
            <!-- Cards will be generated here by JavaScript -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-4 border-t border-gray-900/50">
        <p class="text-xs text-gray-600">&copy; 2026 ENGLISHJIBI • By <span class="text-gray-500">Chiranjibi Sir</span></p>
    </footer>

    <script type="module">
        // Category Configuration: Load all configs and sort by order
        const categories = [
            { folder: 'fill-in-blanks', configPath: 'data/cbse/class10/fill-in-blanks/config.js' },
            { folder: 'error-correction', configPath: 'data/cbse/class10/error-correction/config.js' },
            { folder: 'dialogue', configPath: 'data/cbse/class10/dialogue/config.js' },
            { folder: 'do-as-directed', configPath: 'data/cbse/class10/do-as-directed/config.js' }
        ];

        // Icon and color mapping
        const iconMap = {
            'pencil': {
                svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>',
                colors: 'from-emerald-500 to-emerald-700'
            },
            'alert': {
                svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>',
                colors: 'from-red-500 to-red-700'
            },
            'message': {
                svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>',
                colors: 'from-purple-500 to-purple-700'
            },
            'list': {
                svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>',
                colors: 'from-amber-500 to-amber-700'
            }
        };

        // Engine URL mapping
        function getEngineUrl(config, folder) {
            if (config.engine === 'mcq-fill') {
                return 'engine/cbse-mcq-engine-fill.html?set=1';
            }
            if (config.engine === 'mcq') {
                return `engine/cbse-mcq-engine.html?subject=cbse&level=class10/${folder}&set=1`;
            }
            if (config.engine === 'dialogue') {
                return `engine/cbse-dialogue-engine.html?subject=cbse&level=class10/${folder}&set=1`;
            }
            if (config.engine === 'fill') {
                return `engine/cbse-fill-engine.html?subject=cbse&level=class10/${folder}&set=1`;
            }
            // Default fallback
            return `engine/cbse-mcq-engine.html?subject=cbse&level=class10/${folder}&set=1`;
        }

        // Load all configs and render
        async function loadCategories() {
            const container = document.getElementById('category-container');
            
            try {
                // Load all config files in parallel
                const configs = await Promise.all(
                    categories.map(async cat => {
                        try {
                            const config = await import('./' + cat.configPath).then(m => m.default);
                            return { ...cat, config };
                        } catch (e) {
                            console.warn(`Failed to load ${cat.folder}:`, e);
                            return null;
                        }
                    })
                );

                // Filter out failed loads and sort by order
                const validConfigs = configs.filter(c => c !== null);
                validConfigs.sort((a, b) => (a.config.order || 999) - (b.config.order || 999));

                // Generate HTML for each category
                validConfigs.forEach(cat => {
                    const config = cat.config;
                    const iconData = iconMap[config.icon] || iconMap['pencil'];
                    const url = getEngineUrl(config, cat.folder);

                    const card = document.createElement('a');
                    card.href = url;
                    card.className = 'category-card group flex items-center gap-4 border border-gray-700/50 rounded-2xl p-4 sm:p-5';
                    
                    card.innerHTML = `
                        <div class="card-icon w-12 h-12 sm:w-14 sm:h-14 flex-shrink-0 rounded-xl bg-gradient-to-br ${iconData.colors} flex items-center justify-center shadow-lg">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${iconData.svg}
                            </svg>
                        </div>
                        <div class="flex-grow min-w-0">
                            <h3 class="text-base sm:text-lg font-bold text-white mb-0.5">${config.title}</h3>
                            <p class="text-xs sm:text-sm text-gray-400 truncate">${config.description}</p>
                        </div>
                        <svg class="w-5 h-5 arrow-icon text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading categories:', error);
                container.innerHTML = '<div class="text-center text-red-500">Failed to load categories</div>';
            }
        }

        // Initialize on page load
        loadCategories();
    </script>

</body>

</html>
