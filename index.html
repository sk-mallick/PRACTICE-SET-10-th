<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Special - ENGLISHJIBI</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            color: #ffffff;
            background-image: radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.12) 0%, transparent 50%),
                              linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .class-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.98));
            backdrop-filter: blur(10px);
        }

        @media (hover: hover) and (pointer: fine) {
            .class-card:hover {
                transform: translateY(-6px);
                border-color: rgba(255, 255, 255, 0.15);
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            }
            .class-card:hover .card-icon {
                transform: scale(1.05);
            }
            .class-card:hover .arrow-icon {
                transform: translateX(4px);
                opacity: 1;
            }
        }

        .class-card.coming-soon {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (hover: hover) and (pointer: fine) {
            .class-card.coming-soon:hover {
                transform: none;
                box-shadow: none;
            }
        }

        .card-icon {
            transition: all 0.3s ease;
        }

        .arrow-icon {
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        @media (hover: none) {
            .arrow-icon {
                opacity: 0.7;
            }
        }

        .back-btn {
            transition: all 0.3s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .back-btn:hover {
                background: rgba(239, 68, 68, 0.1);
                border-color: #ef4444;
                color: #ef4444;
            }
        }
    </style>
</head>

<body class="h-screen h-dvh flex flex-col overflow-hidden">

    <!-- Back Navigation -->
    <nav class="w-full max-w-5xl mx-auto px-4 sm:px-6 pt-4 sm:pt-6">
        <a href="#" onclick="history.back(); return false;" class="back-btn inline-flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl border border-gray-700 text-gray-400 text-sm font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Home
        </a>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-4 py-4 sm:py-6">

        <!-- Header - Compact -->
        <div class="text-center mb-6 sm:mb-8">
            <div class="inline-flex items-center gap-2 px-3 sm:px-4 py-1.5 rounded-full border border-red-500/30 bg-red-500/10 backdrop-blur-sm mb-3 sm:mb-4">
                <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path>
                    </svg>
                </div>
                <span class="text-xs sm:text-sm font-bold tracking-wide text-red-400 uppercase">CBSE Special</span>
            </div>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-black tracking-tight mb-1 sm:mb-2 text-white">
                Board Exam <span class="text-red-500">Questions</span>
            </h1>
            <p class="text-gray-400 text-sm max-w-md mx-auto">
                Previous year CBSE board examination questions
            </p>
        </div>

        <!-- Class Cards - Horizontal List -->
        <div class="flex flex-col gap-3 sm:gap-4 w-full max-w-2xl">

            <!-- Class 10 Card -->
            <a href="class10-home.html" class="class-card group flex items-center gap-4 sm:gap-5 border border-gray-700/50 rounded-2xl p-4 sm:p-5">
                <div class="card-icon w-12 h-12 sm:w-14 sm:h-14 flex-shrink-0 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-lg">
                    <span class="text-xl sm:text-2xl font-black text-white">10</span>
                </div>
                <div class="flex-grow min-w-0">
                    <h3 class="text-base sm:text-lg font-bold text-white mb-0.5">Class 10</h3>
                    <p class="text-xs sm:text-sm text-gray-400 truncate">CBSE Board 2020-2025 • 241 Questions</p>
                </div>
                <div class="flex-shrink-0 text-gray-500">
                    <svg class="w-5 h-5 arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
            </a>

            <!-- Class 9 Card (Coming Soon) -->
            <div class="class-card coming-soon flex items-center gap-4 sm:gap-5 border border-gray-800/50 rounded-2xl p-4 sm:p-5">
                <div class="card-icon w-12 h-12 sm:w-14 sm:h-14 flex-shrink-0 rounded-xl bg-gradient-to-br from-purple-600/40 to-purple-800/40 flex items-center justify-center">
                    <span class="text-xl sm:text-2xl font-black text-gray-500">9</span>
                </div>
                <div class="flex-grow min-w-0">
                    <h3 class="text-base sm:text-lg font-bold text-gray-500 mb-0.5">Class 9</h3>
                    <p class="text-xs sm:text-sm text-gray-600">Coming Soon</p>
                </div>
                <div class="flex-shrink-0">
                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>

            <!-- Grammar Advance Card (Coming Soon) -->
            <div class="class-card coming-soon flex items-center gap-4 sm:gap-5 border border-gray-800/50 rounded-2xl p-4 sm:p-5">
                <div class="card-icon w-12 h-12 sm:w-14 sm:h-14 flex-shrink-0 rounded-xl bg-gradient-to-br from-emerald-600/40 to-emerald-800/40 flex items-center justify-center">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <div class="flex-grow min-w-0">
                    <h3 class="text-base sm:text-lg font-bold text-gray-500 mb-0.5">Grammar Advance</h3>
                    <p class="text-xs sm:text-sm text-gray-600">Coming Soon</p>
                </div>
                <div class="flex-shrink-0">
                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>

        </div>

    </main>

    <!-- Footer - Minimal -->
    <footer class="w-full text-center py-3 sm:py-4 border-t border-gray-900/50">
        <p class="text-xs text-gray-600">&copy; 2026 ENGLISHJIBI • By <span class="text-gray-500">Chiranjibi Sir</span></p>
    </footer>

</body>

</html>
